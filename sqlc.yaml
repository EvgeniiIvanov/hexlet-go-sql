version: "2"
sql:
  # SQLite configuration (default - keep original location for backward compatibility)
  - name: "sqlite"
    engine: "sqlite"
    schema: "migrations"
    queries:
      - query/users
      - query/courses
      - query/enrollments
      - query/orders
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        emit_interface: true
        sql_package: "database/sql"
